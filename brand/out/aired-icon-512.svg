<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- metal face: bright top → base #ededed → shadow lower third -->
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f5"/>
      <stop offset="0.14" stop-color="#ededed"/>
      <stop offset="0.46" stop-color="#c2c2c2"/>
      <stop offset="0.66" stop-color="#7d7d7d"/>
      <stop offset="1" stop-color="#6a6a6a"/>
    </linearGradient>
    <!-- red lacquer: sheen top → signal red → deep bottom -->
    <linearGradient id="redLacquer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff3a30"/>
      <stop offset="0.5" stop-color="#e10600"/>
      <stop offset="1" stop-color="#b00500"/>
    </linearGradient>
    <linearGradient id="redSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- bronze inlay -->
    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9b87a"/>
      <stop offset="0.5" stop-color="#a8814a"/>
      <stop offset="1" stop-color="#7a5c2e"/>
    </linearGradient>
    <!-- silver serif -->
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2f2f2"/>
      <stop offset="1" stop-color="#9a9a9a"/>
    </linearGradient>
    <!-- soft spotlight behind the mark (light only, no new hue) -->
    <radialGradient id="spot" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- brushed-steel striations (very fine horizontal lines) -->
    <pattern id="brushed" patternUnits="userSpaceOnUse" width="6" height="3">
      <rect width="6" height="1" fill="#ffffff"/>
    </pattern>
    <filter id="redGlow_i" x="-50%" y="-300%" width="200%" height="700%">
      <feGaussianBlur stdDeviation="12.3904"/>
    </filter>
  </defs>
    <rect width="512" height="512" fill="#0a0a0a"/>
    <rect width="512" height="512" fill="url(#spot)"/>
    
  <g opacity="0.4">
    <!-- faint highlight edge (drawn first, sits just above) -->
    <circle cx="256" cy="251.4894927351517" r="131.07" fill="none" stroke="#efe0bb" stroke-width="2.304" transform="translate(0 -0.6)" opacity="0.3"/>
    <circle cx="256" cy="251.4894927351517" r="153.60" fill="none" stroke="#efe0bb" stroke-width="1.8432" transform="translate(0 -0.6)" opacity="0.22"/>
    <polygon points="256.00,149.09 344.68,302.69 167.32,302.69" fill="none" stroke="#efe0bb" stroke-width="2.304" stroke-linejoin="round" transform="translate(0 -0.6)" opacity="0.28"/>
    <polygon points="256.00,353.89 167.32,200.29 344.68,200.29" fill="none" stroke="#efe0bb" stroke-width="2.304" stroke-linejoin="round" transform="translate(0 -0.6)" opacity="0.28"/>
    <!-- bronze inlay -->
    <circle cx="256" cy="251.4894927351517" r="131.07" fill="none" stroke="url(#bronze)" stroke-width="2.304" transform="translate(0 0)" opacity="1"/>
    <circle cx="256" cy="251.4894927351517" r="153.60" fill="none" stroke="url(#bronze)" stroke-width="1.8432" transform="translate(0 0)" opacity="1"/>
    <polygon points="256.00,149.09 344.68,302.69 167.32,302.69" fill="none" stroke="url(#bronze)" stroke-width="2.304" stroke-linejoin="round" transform="translate(0 0)" opacity="1"/>
    <polygon points="256.00,353.89 167.32,200.29 344.68,200.29" fill="none" stroke="url(#bronze)" stroke-width="2.304" stroke-linejoin="round" transform="translate(0 0)" opacity="1"/>
    <circle cx="256" cy="251.4894927351517" r="3.23" fill="url(#bronze)"/>
  </g>
    
