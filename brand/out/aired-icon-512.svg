  <!-- luminous glow, fading at the tips -->
  <g mask="url(#endsMask_i)">
    <rect x="102.4" y="285.1991394341066" width="307.2" height="11.264" rx="5.632" fill="#e10600" filter="url(#redGlow_i)" opacity="0.7"/>
