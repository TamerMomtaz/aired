  <defs>
    <linearGradient id="ends_i" x1="102.4" y1="0" x2="409.6" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000"/>
      <stop offset="0.040" stop-color="#fff"/>
      <stop offset="0.960" stop-color="#fff"/>
