<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <!-- metal face: bright top → base #ededed → shadow lower third -->
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f5"/>
      <stop offset="0.14" stop-color="#ededed"/>
      <stop offset="0.46" stop-color="#c2c2c2"/>
      <stop offset="0.66" stop-color="#7d7d7d"/>
      <stop offset="1" stop-color="#6a6a6a"/>
    </linearGradient>
    <!-- red lacquer: sheen top → signal red → deep bottom -->
    <linearGradient id="redLacquer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff3a30"/>
      <stop offset="0.5" stop-color="#e10600"/>
      <stop offset="1" stop-color="#b00500"/>
    </linearGradient>
    <linearGradient id="redSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- bronze inlay -->
    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9b87a"/>
      <stop offset="0.5" stop-color="#a8814a"/>
      <stop offset="1" stop-color="#7a5c2e"/>
    </linearGradient>
    <!-- silver serif -->
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2f2f2"/>
      <stop offset="1" stop-color="#9a9a9a"/>
    </linearGradient>
    <!-- soft spotlight behind the mark (light only, no new hue) -->
    <radialGradient id="spot" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- brushed-steel striations (very fine horizontal lines) -->
    <pattern id="brushed" patternUnits="userSpaceOnUse" width="6" height="5">
      <rect width="6" height="1" fill="#ffffff"/>
    </pattern>
    <filter id="redGlow_p" x="-50%" y="-300%" width="200%" height="700%">
      <feGaussianBlur stdDeviation="19.439999999999998"/>
    </filter>
  </defs>
    <rect width="1080" height="1080" fill="#0a0a0a"/>
    <rect width="1080" height="1080" fill="url(#spot)"/>
    
